name: CI/CD Pipeline

on:
  push:
    branches: [ main, feature/*, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ '21' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        run: mvn clean install -pl backend -am -q

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-target
          path: backend/target/
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ '20' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

  test-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-target
          path: backend/target/

      - name: Run backend tests
        run: mvn clean test -pl backend -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 30

  test-restassured:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-target
          path: backend/target/

      - name: Run RestAssured tests
        run: mvn clean test -pl restassured-tests -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restassured-test-results
          path: restassured-tests/target/surefire-reports/
          retention-days: 30

  test-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build and test frontend
        run: cd frontend && npm run build && npm test -- --passWithNoTests 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results.xml
          retention-days: 30

  mutation-testing:
    needs: [ test-backend, test-restassured ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-target
          path: backend/target/

      - name: Run backend mutation tests
        run: mvn clean pitest:mutationCoverage -pl backend -q

      - name: Run RestAssured mutation tests
        run: mvn clean pitest:mutationCoverage -pl restassured-tests -q

      - name: Upload mutation results
        uses: actions/upload-artifact@v4
        with:
          name: mutation-results
          path: |
            backend/target/pit-reports/
            restassured-tests/target/pit-reports/
          retention-days: 30

  generate-report:
    needs: [ test-backend, test-restassured, mutation-testing ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: .

      - name: Generate report
        run: python3 scripts/generate-report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/test-report.html
          retention-days: 90

  test-summary:
    if: always()
    needs: [ test-backend, test-restassured, test-frontend, mutation-testing ]
    runs-on: ubuntu-latest
    steps:
      - name: Test Results
        run: |
          echo "✅ Backend Tests: ${{ needs.test-backend.result }}"
          echo "✅ RestAssured Tests: ${{ needs.test-restassured.result }}"
          echo "✅ Frontend Tests: ${{ needs.test-frontend.result }}"
          echo "🧬 Mutation Tests: ${{ needs.mutation-testing.result }}"
