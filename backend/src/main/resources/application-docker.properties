# Docker/Production configuration with PostgreSQL

# Database configuration (will be overridden by environment variables from docker-compose)
spring.datasource.url=jdbc:postgresql://postgres:5432/testdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=test
spring.datasource.password=test

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Enable Liquibase for database schema management
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.liquibase=INFO

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT configuration
jwt.secret=my-very-secret-key-for-jwt-signing-at-least-32-bytes-long
jwt.expiration-ms=3600000
