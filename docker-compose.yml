services:
  postgres:
    image: postgres:15
    container_name: test-project-postgres
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/01-init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - test-project-network

  backend:
    image: test-project-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: test-project-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
      SPRING_DATASOURCE_USERNAME: test
      SPRING_DATASOURCE_PASSWORD: test
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - test-project-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 10

  frontend:
    image: test-project-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: test-project-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - test-project-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || (which wget && wget -q -O- http://localhost:3000) || exit 1"]
      interval: 5s
      timeout: 5s
      start_period: 15s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: test-project-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 10
      SCRIPT_NAME_LENGTH: 4
    volumes:
      - ./scripts/pgadmin-servers.json:/pgadmin4/servers.json
    ports:
      - "5050:80"
    networks:
      - test-project-network
    depends_on:
      - postgres

networks:
  test-project-network:
    driver: bridge
